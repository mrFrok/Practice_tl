# docker-compose.yml — описывает ВСЕ контейнеры проекта и как они связаны.
# Поднимается одной командой:  docker compose up

services:

  # ── База данных PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16              
    environment:                   
      POSTGRES_DB: travelline
      POSTGRES_USER: travelline
      POSTGRES_PASSWORD: travelline_pass
    volumes:
      # именованный том: данные БД переживут пересоздание контейнера
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # проверяем, что БД реально готова принимать подключения
      test: ["CMD-SHELL", "pg_isready -U travelline"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Наше Django-приложение ─────────────────────────────────────────
  web:
    build: .                        # собрать образ по нашему Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      # монтируем код с хоста внутрь контейнера: правишь файл — видно сразу,
      # без пересборки образа (удобно для разработки)
      - .:/app
    ports:
      - "8000:8000"                 # localhost:8000 (хост) → 8000 (контейнер)
    environment:
      # эти переменные прочитает Django в settings.py, чтобы подключиться к БД.
      # ВАЖНО: host = "db" — это имя сервиса выше, Docker сам резолвит его в сеть.
      POSTGRES_DB: travelline
      POSTGRES_USER: travelline
      POSTGRES_PASSWORD: travelline_pass
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy  # web стартует только когда БД готова

# Объявление именованного тома для данных PostgreSQL
volumes:
  postgres_data:
