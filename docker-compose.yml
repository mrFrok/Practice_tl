# docker-compose.yml — описывает ВСЕ контейнеры проекта и как они связаны.
# Поднимается одной командой:  docker compose up
# Секреты и настройки берутся из файла .env (см. .env.example).

services:

  # ── База данных PostgreSQL ─────────────────────────────────────────
  db:
    image: postgres:16
    env_file: .env                  # POSTGRES_* берутся из .env
    volumes:
      # именованный том: данные БД переживут пересоздание контейнера
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # проверяем, что БД реально готова принимать подключения
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Наше Django-приложение ─────────────────────────────────────────
  web:
    build: .                        # собрать образ по нашему Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    env_file: .env                  # SECRET_KEY, DEBUG, POSTGRES_* из .env
    environment:
      # host/port БД — не секреты, они специфичны для docker-сети,
      # поэтому оставляем здесь. host = "db" (имя сервиса выше).
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      # монтируем код с хоста внутрь контейнера: правишь файл — видно сразу
      - .:/app
    ports:
      - "8000:8000"                 # localhost:8000 (хост) → 8000 (контейнер)
    depends_on:
      db:
        condition: service_healthy  # web стартует только когда БД готова

# Объявление именованного тома для данных PostgreSQL
volumes:
  postgres_data:
