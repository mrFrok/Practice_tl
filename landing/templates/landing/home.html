<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ hero.title }}</title>
    <style>
        /* Минимальные стили — просто чтобы блок читался. Нормальный CSS добавим позже. */
        body { font-family: system-ui, sans-serif; margin: 0; }
        .hero { padding: 80px 20px; text-align: center; background: #2B579A; color: #fff; }
        .hero__title { font-size: 3rem; margin: 0 0 8px; }
        .hero__subtitle { font-size: 1.25rem; opacity: .9; margin: 0; }
        .hero__stats { display: flex; gap: 48px; justify-content: center; margin-top: 40px; flex-wrap: wrap; }
        .stat__value { display: block; font-size: 2rem; font-weight: 700; }
        .stat__label { opacity: .85; }
    </style>
</head>
<body>
    {# ===== Блок Hero ===== #}
    <section class="hero">
        <h1 class="hero__title">{{ hero.title }}</h1>
        <p class="hero__subtitle">{{ hero.subtitle }}</p>

        <div class="hero__stats">
            {% for stat in hero.stats.all %}
                <div class="stat">
                    <span class="stat__value">{{ stat.value }}</span>
                    <span class="stat__label">{{ stat.label }}</span>
                </div>
            {% endfor %}
        </div>
    </section>
    <section class="team">
        <h2>Любим и бережем свою команду</h2>
        {% for member in team %}
            <div class="member">
                <h3>{{member.name}}</h3>
                <p>{{member.position}}</p>
            </div>
        {% endfor %}
    </section>
</body>
</html>
