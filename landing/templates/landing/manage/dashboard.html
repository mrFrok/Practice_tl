<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2B579A; }
        ul { list-style: none; padding: 0; }
        li { margin: 8px 0; }
        a { color: #2B579A; text-decoration: none; font-size: 1.1rem; }
        a:hover { text-decoration: underline; }
        .back { font-size: .95rem; }
    </style>
</head>
<body>
    <p class="back"><a href="{% url 'landing:home' %}">← на главную</a></p>
    <h1>Админка блоков</h1>

    <ul>
        <li><a href="{% url 'landing:hero_edit' %}">Hero (заголовок + статистика)</a></li>
        {% for key, cfg in list_blocks.items %}
            <li><a href="{% url 'landing:list_block_edit' block=key %}">{{ cfg.title }}</a></li>
        {% endfor %}
    </ul>
</body>
</html>
