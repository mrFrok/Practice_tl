<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка — {{ title }}</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2B579A; }
        form p { margin: 10px 0; }
        label { display: inline-block; min-width: 110px; font-weight: 600; }
        input[type="text"], input[type="number"], input[type="url"] { padding: 6px; width: 55%; }
        .item-form { border: 1px solid #ddd; padding: 12px; margin: 10px 0; border-radius: 6px; }
        .btn { background: #2B579A; color: #fff; border: 0; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .links a { color: #2B579A; }
    </style>
</head>
<body>
    <p class="links"><a href="{% url 'landing:manage_dashboard' %}">← в админку</a></p>

    <h1>Редактирование блока «{{ title }}»</h1>

    <form method="post">
        {% csrf_token %}
        {{ formset.management_form }}

        {% for form in formset %}
            <div class="item-form">
                {{ form.as_p }}
            </div>
        {% endfor %}

        <button type="submit" class="btn">Сохранить</button>
    </form>
</body>
</html>
